workflows:
  expo-npm-workflow:
    name: Expo NPM Workflow
    max_build_duration: 60
    environment:
      vars:
        EXPO_TOKEN: Encrypted  # optional if you want to publish
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo Prebuild (optional, only for bare workflow)
        script: npx expo prebuild
      - name: Build Android
        script: npx eas build --platform android --non-interactive
      - name: Build iOS
        script: npx eas build --platform ios --non-interactive